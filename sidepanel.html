<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish to Web Settings</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
  <div class="container">
    <h1>Publish to Web</h1>
    <p class="subtitle">Generate & deploy a static site from this tab.</p>

    <details id="settings-panel" class="settings-details" open>
      <summary class="settings-summary">Configuration Settings</summary>
      <div class="settings-content">
        <div class="form-group">
          <label for="gemini-key">Gemini API Key</label>
          <input type="password" id="gemini-key" placeholder="Enter Gemini Key">
        </div>

        <div class="form-group">
          <label for="netlify-key">Netlify API Key (Personal Access Token)</label>
          <input type="password" id="netlify-key" placeholder="Enter Netlify Key">
        </div>

        <div class="form-group">
          <label for="gemini-model">Text & Code Model</label>
          <select id="gemini-model">
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
          </select>
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" id="enable-image-gen" checked>
          <label for="enable-image-gen">Enable AI Image Generation</label>
        </div>

        <div class="form-group" id="image-model-group">
          <label for="image-model">Image Generation Model</label>
          <select id="image-model">
            <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash Image / Nano Banana 2</option>
            <option value="gemini-3-pro-image-preview">Gemini 3 Pro Image / Nano Banana Pro</option>
            <option value="gemini-2.5-flash-image">Gemini 2.5 Flash Image</option>
            <option value="imagen-4.0-generate">Imagen 4</option>
            <option value="imagen-4.0-fast-generate">Imagen 4 Fast</option>
            <option value="imagen-4.0-ultra-generate">Imagen 4 Ultra</option>
            <option value="imagen-3.0-generate-002">Imagen 3</option>
          </select>
        </div>

        <button id="save-settings" class="btn secondary">Save Settings</button>
      </div>
    </details>

    <hr>

    <div class="form-group custom-prompt-group">
      <label for="custom-prompt">Custom Instructions (Optional)</label>
      <textarea id="custom-prompt"
        placeholder="Specific design instructions, extra context, or what the site should be about entirely if you don't want to scrape the page..."></textarea>
    </div>

    <div class="form-group" style="margin-bottom: 12px;">
      <label>Upload Images (Optional)</label>
      <label for="image-upload" class="file-upload-btn">
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
        </svg>
        Select Images
      </label>
      <input type="file" id="image-upload" multiple accept="image/*" class="hidden-file-input">
      <div id="image-preview-list" class="image-preview-list"></div>
    </div>

    <div class="form-group checkbox-group" style="margin-bottom: 8px;">
      <input type="checkbox" id="scrape-page" checked>
      <label for="scrape-page">Include content from current tab</label>
    </div>

    <div style="display: flex; gap: 8px;">
      <button id="publish-btn" class="btn primary" style="flex: 1;">Draft Site</button>
      <button id="cancel-btn" class="btn secondary hidden" style="flex: 1;">Cancel</button>
    </div>

    <div class="status-container">
      <label for="status-output">Status</label>
      <textarea id="status-output" readonly placeholder="Waiting for instructions..."></textarea>
    </div>

    <div id="result-link" class="hidden">
      <p>Live Site: <a id="live-url" href="#" target="_blank"></a></p>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>

</html>
